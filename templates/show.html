<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Envoyer une photo</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    </head>
    <body class="container">
        <nav class="navbar bg-none">
          <div class="container-fluid">
              <a class="navbar-brand" href="/"><h1>Statistics</h1></a>
          </div>
        </nav>
        <!-- Grille d'images -->
            <div class="row g-3 gap-2">
              {% for image in images %}
              <div class="card" style="width: 18rem;">
                  <img src="{{ url_for('static', filename='uploads/' + image[1]) }}"
                       class="card-img-top gap-2"
                       alt="..."
                       style="height: 200px; object-fit: cover;">
                  <div class="card-body">
                      <h5 class="card-title">Number of square</h5>
                      <p class="card-text">{{ image[2] }}</p>
                      <a href="{{ url_for('detail', id=image[0]) }}" class="btn btn-primary">show</a>
                  </div>
              </div>
              {% endfor %}
            </div>
    </body>
</html>
