<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Envoyer une photo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100 p-3">

  <div class="card shadow-sm w-100" style="max-width: 420px;">
    <div class="card-body p-4">
        {% if succes: %}
            <p class="alert alert-success">{{ succes }}</p>
        {% endif %}
      <h5 class="card-title mb-4 text-center">📷 Envoyer une photo</h5>

      <form action="/" method="POST" enctype="multipart/form-data">

        <div class="mb-4">
          <label for="photo" class="form-label fw-semibold">Photo</label>
          <input
            type="file"
            class="form-control form-control-lg"
            id="photo"
            name="photo"
            accept="image/*"
            capture="environment"
            required
          />
          <div class="form-text">La caméra s'ouvrira directement sur mobile.</div>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg">
            Envoyer
          </button>
          <a class="link text-center mt-2" href="/pict">Show all pictures</a>
        </div>

      </form>
    </div>
  </div>

</body>
</html>
